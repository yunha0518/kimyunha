<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yunha Kim</title>
  <style>
    :root {
      --bg: #f3f2ee;
      --text: #111111;
      --muted: #626262;
      --line: rgba(17, 17, 17, 0.18);
      --accent: #8f1d1d;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      letter-spacing: 0.01em;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      color: inherit;
      font: inherit;
    }

    .site {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 205px;
    }

    .content {
      min-height: 100vh;
      padding: 28px 40px 36px 34px;
      position: relative;
    }

    .sidebar {
      border-left: 1px solid var(--line);
      padding: 18px 22px 28px 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .brand {
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      min-height: 285px;
      padding-top: 2px;
    }

    .brand img {
      width: 150px;
      height: auto;
      display: block;
      opacity: 0.95;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-end;
      padding-bottom: 2px;
    }

    .nav button {
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1.1;
      opacity: 0.95;
      position: relative;
    }

    .nav button.active::after {
      content: "";
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin-left: 7px;
      position: relative;
      top: -1px;
    }

    .page {
      display: none;
      min-height: calc(100vh - 64px);
      position: relative;
    }

    .page.active {
      display: block;
    }

    .home-page {
      min-height: calc(100vh - 64px);
    }

    .home-stage {
      width: 100%;
      min-height: calc(100vh - 64px);
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 2px;
      padding-right: 24px;
      padding-bottom: 92px;
    }

    .home-stage img {
      width: min(86%, 1220px);
      height: auto;
      display: block;
      object-fit: contain;
    }

    .page-title {
      font-size: 1rem;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    .cv-wrap,
    .exhibitions-wrap {
      padding-top: 2px;
      max-width: 860px;
    }

    .cv-name {
      font-size: 1rem;
      margin-bottom: 24px;
    }

    .cv-section,
    .exhibitions-section {
      margin-bottom: 28px;
    }

    .cv-section-title,
    .exhibitions-section-title {
      font-size: 1rem;
      margin-bottom: 8px;
    }

    .cv-body,
    .exhibitions-body {
      font-size: 0.98rem;
      line-height: 1.85;
      color: var(--text);
      white-space: pre-line;
    }

    .works-wrap {
      padding-top: 2px;
    }

    .works-layout {
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr);
      gap: 26px;
      align-items: start;
    }

    .works-list {
      padding-top: 2px;
    }

    .works-list button {
      width: 100%;
      text-align: left;
      background: transparent;
      border: none;
      padding: 5px 0;
      cursor: pointer;
      display: flex;
      align-items: baseline;
      gap: 10px;
      font-size: 0.98rem;
      line-height: 1.4;
    }

    .works-list .year {
      min-width: 42px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .works-list button.active .title {
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .work-view {
      max-width: 980px;
    }

    .work-frame {
      width: 100%;
      aspect-ratio: 16 / 9.8;
      background: #000;
      overflow: hidden;
      position: relative;
    }

    .work-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .work-frame.blank::before {
      content: "";
      position: absolute;
      inset: 0;
      background: #000;
    }

    .work-caption {
      padding-top: 16px;
      max-width: 760px;
      font-size: 0.97rem;
      line-height: 1.8;
    }

    .work-caption em {
      font-style: italic;
    }

    .work-caption a {
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .contact-page {
      min-height: calc(100vh - 64px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding-bottom: 88px;
    }

    .contact-card {
      text-align: center;
      font-size: 1rem;
      line-height: 1.95;
    }

    @media (max-width: 1100px) {
      .site {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
        border-left: none;
        border-top: 1px solid var(--line);
        order: 2;
        flex-direction: row;
        align-items: center;
        gap: 18px;
      }

      .brand {
        min-height: auto;
      }

      .brand img {
        width: 110px;
      }

      .nav {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 14px;
        align-items: center;
      }

      .content {
        padding: 24px 22px 28px;
      }

      .works-layout {
        grid-template-columns: 1fr;
      }

      .home-stage {
        min-height: 60vh;
        padding-bottom: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="site">
    <main class="content">
      <section class="page home-page active" id="home-page">
        <div class="home-stage">
          <img src="/mnt/data/yunhakimsign.png" alt="Yunha Kim signature" />
        </div>
      </section>

      <section class="page" id="cv-page">
        <div class="cv-wrap">
          <div class="cv-name">Yunha Kim</div>

          <div class="cv-section">
            <div class="cv-section-title">Education</div>
            <div class="cv-body">To be updated</div>
          </div>

          <div class="cv-section">
            <div class="cv-section-title">Bio</div>
            <div class="cv-body">To be updated</div>
          </div>

          <div class="cv-section">
            <div class="cv-section-title">Selected Exhibitions</div>
            <div class="cv-body">To be updated</div>
          </div>

          <div class="cv-section">
            <div class="cv-section-title">Awards / Residencies</div>
            <div class="cv-body">To be updated</div>
          </div>
        </div>
      </section>

      <section class="page" id="works-page">
        <div class="works-wrap">
          <div class="works-layout">
            <div class="works-list" id="works-list"></div>

            <div class="work-view">
              <div class="work-frame" id="work-frame">
                <img id="work-image" alt="Selected work image" />
              </div>
              <div class="work-caption" id="work-caption"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="page" id="exhibitions-page">
        <div class="exhibitions-wrap">
          <div class="exhibitions-section">
            <div class="exhibitions-section-title">Exhibitions</div>
            <div class="exhibitions-body">To be updated</div>
          </div>
        </div>
      </section>

      <section class="page contact-page" id="contact-page">
        <div class="contact-card">
          <div>ms.kimyuna@gmail.com</div>
          <div>@yuna.rchive</div>
        </div>
      </section>
    </main>

    <aside class="sidebar">
      <div class="brand">
        <img src="/mnt/data/9f60e759-8247-4ecf-a6d4-a5b781ebf1eb.png" alt="Yunha Kim" />
      </div>
      <nav class="nav" aria-label="Main navigation">
        <button class="nav-btn active" data-page="home-page">Home</button>
        <button class="nav-btn" data-page="cv-page">CV</button>
        <button class="nav-btn" data-page="works-page">Works</button>
        <button class="nav-btn" data-page="exhibitions-page">Exhibitions</button>
        <button class="nav-btn" data-page="contact-page">Contact</button>
      </nav>
    </aside>
  </div>

  <script>
    const pages = document.querySelectorAll('.page');
    const navButtons = document.querySelectorAll('.nav-btn');

    function showPage(pageId) {
      pages.forEach((page) => page.classList.toggle('active', page.id === pageId));
      navButtons.forEach((button) => button.classList.toggle('active', button.dataset.page === pageId));
    }

    navButtons.forEach((button) => {
      button.addEventListener('click', () => showPage(button.dataset.page));
    });

    const works = [
      {
        title: 'Prayer for a Daughter',
        year: '2025',
        image: '/mnt/data/딸을위한기도.jpg',
        caption: `<em>Prayer for a Daughter</em>, 2025<br>Single-channel video, color, sound<br>9 min 24 sec<br><a href="#" id="contact-link">Full video available upon request (Contact)</a>`
      },
      {
        title: 'Work Title',
        year: '2025',
        image: '',
        caption: `<em>Work Title</em>, 2025<br>Information to be updated` 
      },
      {
        title: 'Work Title',
        year: '2024',
        image: '',
        caption: `<em>Work Title</em>, 2024<br>Information to be updated` 
      }
    ];

    const worksList = document.getElementById('works-list');
    const workFrame = document.getElementById('work-frame');
    const workImage = document.getElementById('work-image');
    const workCaption = document.getElementById('work-caption');

    function renderWorksList() {
      worksList.innerHTML = '';
      works.forEach((work, index) => {
        const button = document.createElement('button');
        button.innerHTML = `<span class="year">${work.year}</span><span class="title">${work.title}</span>`;
        if (index === 0) button.classList.add('active');
        button.addEventListener('click', () => selectWork(index));
        worksList.appendChild(button);
      });
    }

    function selectWork(index) {
      const work = works[index];
      [...worksList.querySelectorAll('button')].forEach((btn, i) => {
        btn.classList.toggle('active', i === index);
      });

      workCaption.innerHTML = work.caption;

      if (work.image) {
        workImage.src = work.image;
        workImage.style.display = 'block';
        workFrame.classList.remove('blank');
      } else {
        workImage.removeAttribute('src');
        workImage.style.display = 'none';
        workFrame.classList.add('blank');
      }

      const contactLink = document.getElementById('contact-link');
      if (contactLink) {
        contactLink.addEventListener('click', (event) => {
          event.preventDefault();
          showPage('contact-page');
        });
      }
    }

    renderWorksList();
    selectWork(0);
  </script>
</body>
</html>
