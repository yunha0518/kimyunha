<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Yunha Kim</title>
<style>

:root{
  --bg:#ffffff;
  --text:#111;
  --muted:#666;
  --line:rgba(0,0,0,0.18);
  --accent:#8f1d1d;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Source Han Serif","Noto Serif CJK KR","Noto Serif KR","Batang","Times New Roman",serif;
  background:var(--bg);
  color:var(--text);
}

.site{
  display:grid;
  grid-template-columns:1fr 200px;
  min-height:100vh;
}

.content{
  padding:30px 40px 30px 40px;
}

.sidebar{
  border-left:1px solid var(--line);
  padding:20px 22px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* top right logo */
.brand{
  display:flex;
  justify-content:flex-end;
}

.brand img{
  width:150px;
}

/* right menu */
.nav{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:10px;
}

.nav button{
  border:none;
  background:none;
  font:inherit;
  cursor:pointer;
  font-size:1rem;
}

.nav button.active::after{
  content:"";
  width:6px;
  height:6px;
  background:var(--accent);
  border-radius:50%;
  display:inline-block;
  margin-left:7px;
}

.page{display:none}
.page.active{display:block}

/* HOME */
.home-stage{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  min-height:80vh;
}

.home-stage img{
  width:85%;
  max-width:1100px;
}

/* CV */
.cv-wrap{
  max-width:700px;
  margin-top:20px;
}

.cv-name{
  margin-bottom:20px;
}

.cv-section{
  margin-bottom:25px;
}

.cv-section-title{
  margin-bottom:6px;
}

.cv-body{
  line-height:1.8;
}

/* WORKS */
.works-layout{
  display:grid;
  grid-template-columns:220px 1fr;
  gap:25px;
}

.works-list button{
  border:none;
  background:none;
  padding:4px 0;
  text-align:left;
  font:inherit;
  cursor:pointer;
  display:flex;
  gap:8px;
}

.year{
  width:40px;
  color:var(--muted);
}

.works-list button.active .title{
  text-decoration:underline;
}

.work-frame{
  width:100%;
  aspect-ratio:16/10;
  background:#000;
  overflow:hidden;
}

.work-frame img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}

.work-caption{
  margin-top:15px;
  line-height:1.8;
}

.work-caption a{
  text-decoration:underline;
}

/* CONTACT */
.contact-page{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:70vh;
}

.contact-card{
  text-align:center;
  line-height:2;
}

@media (max-width:1000px){

.site{
  grid-template-columns:1fr;
}

.sidebar{
  border-left:none;
  border-top:1px solid var(--line);
  flex-direction:row;
  align-items:center;
}

.nav{
  flex-direction:row;
}

.works-layout{
  grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="site">

<main class="content">

<section class="page active" id="home-page">
<div class="home-stage">
<img src="images/signature-main.png">
</div>
</section>

<section class="page" id="cv-page">

<div class="cv-wrap">

<div class="cv-name">Yunha Kim</div>

<div class="cv-section">
<div class="cv-section-title">Education</div>
<div class="cv-body">To be updated</div>
</div>

<div class="cv-section">
<div class="cv-section-title">Bio</div>
<div class="cv-body">To be updated</div>
</div>

<div class="cv-section">
<div class="cv-section-title">Selected Exhibitions</div>
<div class="cv-body">To be updated</div>
</div>

<div class="cv-section">
<div class="cv-section-title">Awards / Residencies</div>
<div class="cv-body">To be updated</div>
</div>

</div>

</section>

<section class="page" id="works-page">

<div class="works-layout">

<div class="works-list" id="works-list"></div>

<div>

<div class="work-frame" id="work-frame">
<img id="work-image">
</div>

<div class="work-caption" id="work-caption"></div>

</div>

</div>

</section>

<section class="page contact-page" id="contact-page">

<div class="contact-card">

<div>ms.kimyuna@gmail.com</div>
<div>@yuna.rchive</div>

</div>

</section>

</main>

<aside class="sidebar">

<div class="brand">
<img src="images/signature-main.png">
</div>

<nav class="nav">

<button class="nav-btn active" data-page="home-page">Home</button>
<button class="nav-btn" data-page="cv-page">CV</button>
<button class="nav-btn" data-page="works-page">Works</button>
<button class="nav-btn" data-page="contact-page">Contact</button>

</nav>

</aside>

</div>

<script>

const pages=document.querySelectorAll('.page')
const navButtons=document.querySelectorAll('.nav-btn')

function showPage(pageId){

pages.forEach(p=>p.classList.toggle('active',p.id===pageId))
navButtons.forEach(b=>b.classList.toggle('active',b.dataset.page===pageId))

}

navButtons.forEach(button=>{

button.addEventListener('click',()=>{
showPage(button.dataset.page)
})

})

const works=[
{
title:"Prayer for a Daughter",
year:"2025",
image:"prayer.jpg",
caption:`<em>Prayer for a Daughter</em>, 2025<br>
Single-channel video, color, sound<br>
9 min 24 sec<br>
<a href="#" id="contact-link">Full video available upon request (Contact)</a>`
},
{
title:"Work Title",
year:"2024",
image:"",
caption:"Information to be updated"
}
]

const worksList=document.getElementById('works-list')
const workImage=document.getElementById('work-image')
const workFrame=document.getElementById('work-frame')
const workCaption=document.getElementById('work-caption')

function renderWorks(){

worksList.innerHTML=""

works.forEach((work,index)=>{

const button=document.createElement('button')
button.innerHTML=`<span class="year">${work.year}</span><span class="title">${work.title}</span>`

if(index===0)button.classList.add('active')

button.addEventListener('click',()=>selectWork(index))

worksList.appendChild(button)

})

}

function selectWork(index){

const work=works[index]

[...worksList.querySelectorAll('button')].forEach((b,i)=>{
b.classList.toggle('active',i===index)
})

workCaption.innerHTML=work.caption

if(work.image){
workImage.src=work.image
workImage.style.display='block'
}
else{
workImage.style.display='none'
}

const link=document.getElementById('contact-link')

if(link){
link.addEventListener('click',e=>{

e.preventDefault()
showPage('contact-page')

})
}

}

renderWorks()
selectWork(0)

</script>

</body>
</html>
